<!DOCTYPE html>
<html lang="en" class="light"> <!-- Default to light mode -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Momentum - Your To-Do List</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --bg-primary: #f7f8fc;
            --bg-secondary: #ffffff;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --accent-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --shadow-color: rgba(0,0,0,0.08);
        }

        html.dark {
            --bg-primary: #111827;
            --bg-secondary: #1f2937;
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --accent-gradient: linear-gradient(135deg, #818cf8 0%, #a78bfa 100%);
            --shadow-color: rgba(0,0,0,0.2);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 250px 1fr;
            height: 100vh;
        }

        #sidebar {
            background-color: var(--bg-secondary);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            background-color: rgba(255,255,255,0.8);
        }
        
        html.dark #sidebar {
            background-color: rgba(31, 41, 55, 0.8);
        }

        @media (max-width: 768px) {
            .main-layout { grid-template-columns: 1fr; }
            #sidebar {
                position: fixed; top: 0; left: -250px; height: 100%;
                z-index: 100; transition: left 0.3s ease-in-out;
            }
            #sidebar.open { left: 0; }
            #content-area { padding-top: 70px; }
        }

        .task-item {
            background-color: var(--bg-secondary);
            box-shadow: 0 4px 12px var(--shadow-color);
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.3s ease;
            animation: slideIn 0.4s ease-out forwards;
        }
        .task-item:hover { transform: translateY(-3px); box-shadow: 0 6px 16px var(--shadow-color); }
        .task-item.completed-animation { opacity: 0; transform: translateX(50px); }

        .completed-task { text-decoration: line-through; color: var(--text-secondary); }
        .completed-task .task-details { opacity: 0.6; }

        .checkbox-custom:checked { background-color: #667eea; border-color: #667eea; }
        .checkbox-custom:checked i { display: block; }
        
        .nav-link.active { background-image: var(--accent-gradient); color: white; font-weight: 600; }
        
        .notification-modal .modal-content {
             background-color: var(--bg-secondary);
             backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
             background-color: rgba(255,255,255,0.8);
        }
         html.dark .notification-modal .modal-content {
             background-color: rgba(31, 41, 55, 0.9);
        }

        .quote-card { background: var(--accent-gradient); }

        /* Dark Mode Toggle Switch */
        .theme-switch-wrapper { display: flex; align-items: center; }
        .theme-switch { display: inline-block; height: 26px; position: relative; width: 50px; }
        .theme-switch input { display:none; }
        .slider { background-color: #ccc; bottom: 0; cursor: pointer; left: 0; position: absolute; right: 0; top: 0; transition: .4s; }
        .slider:before { background-color: #fff; bottom: 4px; content: ""; height: 18px; left: 4px; position: absolute; transition: .4s; width: 18px; }
        input:checked + .slider { background-color: #667eea; }
        input:checked + .slider:before { transform: translateX(24px); }
        .slider.round { border-radius: 34px; }
        .slider.round:before { border-radius: 50%; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-100">

    <div class="main-layout">
        <!-- Sidebar Navigation -->
        <nav id="sidebar" class="p-6 flex flex-col justify-between border-r border-gray-200/10">
            <div>
                <div class="flex items-center gap-3 mb-10">
                    <i class="fas fa-rocket text-3xl" style="color: #7c3aed;"></i>
                    <h1 class="text-2xl font-extrabold text-primary">Momentum</h1>
                </div>
                <ul class="space-y-3">
                    <li><a href="#" class="nav-link active flex items-center gap-3 px-4 py-3 rounded-lg" data-target="home"><i class="fas fa-home w-5 text-center"></i><span>Home</span></a></li>
                    <li><a href="#" class="nav-link flex items-center gap-3 px-4 py-3 rounded-lg" data-target="about"><i class="fas fa-info-circle w-5 text-center"></i><span>About</span></a></li>
                    <li><a href="#" class="nav-link flex items-center gap-3 px-4 py-3 rounded-lg" data-target="help"><i class="fas fa-question-circle w-5 text-center"></i><span>Help</span></a></li>
                </ul>
            </div>
            <div>
                <div class="theme-switch-wrapper mb-4">
                    <label class="theme-switch" for="checkbox">
                        <input type="checkbox" id="checkbox" />
                        <div class="slider round"></div>
                    </label>
                    <span class="ml-3 text-sm font-medium text-secondary">Dark Mode</span>
                </div>
                <div id="auth-info" class="text-left">
                    <p class="text-xs text-secondary">User ID:</p>
                    <p id="userIdDisplay" class="font-mono text-sm break-all text-secondary">Loading...</p>
                </div>
            </div>
        </nav>

        <!-- Mobile Header -->
        <header class="md:hidden fixed top-0 left-0 right-0 bg-secondary/80 backdrop-blur-sm shadow-md p-4 flex justify-between items-center z-50">
             <h1 class="text-xl font-bold text-primary">Momentum</h1>
             <button id="menu-toggle" class="text-2xl text-primary"><i class="fas fa-bars"></i></button>
        </header>

        <!-- Main Content Area -->
        <main id="content-area" class="flex-1 p-4 sm:p-8 overflow-y-auto">
            <!-- All page content will be dynamically shown here -->
        </main>
    </div>

    <!-- Page Templates -->
    <template id="home-template">
        <div id="page-home" class="page-content">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 space-y-8">
                    <div class="quote-card text-white p-6 rounded-2xl shadow-lg">
                        <p id="quote-text" class="text-lg italic mb-2"></p>
                        <p id="quote-author" class="text-right font-semibold"></p>
                    </div>
                    <div>
                        <h3 class="text-2xl font-bold text-primary mb-4">Upcoming Tasks</h3>
                        <div id="task-list" class="space-y-3"></div>
                    </div>
                    <div>
                        <h3 class="text-2xl font-bold text-primary mb-4">Completed</h3>
                        <div id="completed-task-list" class="space-y-3"></div>
                    </div>
                </div>
                <div class="lg:col-span-1">
                    <div class="bg-secondary p-6 rounded-2xl shadow-md h-fit">
                        <h2 class="text-2xl font-bold text-primary mb-4">Add a Task</h2>
                        <form id="task-form" class="space-y-4"></form>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <template id="about-template">
        <div id="page-about" class="page-content bg-secondary p-8 rounded-2xl shadow-md">
             <h2 class="text-3xl font-bold text-primary mb-6">About Momentum</h2>
            <p class="text-secondary leading-relaxed mb-6">Momentum is a smart to-do list application designed to help you organize your life and stay productive. It's more than just a list; it's a personal assistant that keeps you on track with timely reminders and a clean, energetic interface.</p>
            <div class="mb-8">
                <h3 class="text-xl font-semibold text-gray-700 mb-3">User Rating</h3>
                <div class="flex items-center gap-2 text-yellow-400 text-2xl">
                    <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star-half-alt"></i>
                    <span class="text-secondary text-lg ml-2">(4.5 / 5.0)</span>
                </div>
            </div>
        </div>
    </template>
    
    <template id="help-template">
         <div id="page-help" class="page-content bg-secondary p-8 rounded-2xl shadow-md">
            <h2 class="text-3xl font-bold text-primary mb-6">Help & FAQ</h2>
            <div class="space-y-6">
                <div>
                    <h3 class="text-xl font-semibold text-primary mb-2">How do I add a task?</h3>
                    <p class="text-secondary">Navigate to the 'Home' screen. On the right-hand side, you'll find the "Add a Task" form. Fill in the task details, date, and time, then click the "Add Task" button.</p>
                </div>
                <div>
                    <h3 class="text-xl font-semibold text-primary mb-2">How do I mark a task as complete?</h3>
                    <p class="text-secondary">Simply click the checkbox next to the task name. The task will be moved to the "Completed" section with a satisfying animation.</p>
                </div>
            </div>
        </div>
    </template>

    <!-- Notification Modal -->
    <div id="notification-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-[200] opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="modal-content rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center transform scale-95 transition-transform duration-300">
            <div class="text-5xl mb-4"></div>
            <h3 class="text-2xl font-bold text-primary mb-2"></h3>
            <p id="notification-text" class="text-secondary mb-6"></p>
            <button id="close-notification-btn" class="bg-indigo-600 text-white font-bold py-2 px-6 rounded-lg hover:bg-indigo-700">Got it</button>
        </div>
    </div>
    
    <div id="sidebar-overlay" class="md:hidden fixed inset-0 bg-black bg-opacity-50 z-90 hidden"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, collection, addDoc, deleteDoc, updateDoc, serverTimestamp, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { setLogLevel } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- App State & Config ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
        let app, db, auth, userId = null, unsubscribeTasks = null;
        let allTasks = [];
        let audioCtx;

        // --- DOM Elements ---
        const contentArea = document.getElementById('content-area');
        const navLinks = document.querySelectorAll('.nav-link');
        const menuToggle = document.getElementById('menu-toggle');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');
        const themeToggle = document.getElementById('checkbox');
        const userIdDisplay = document.getElementById('userIdDisplay');
        const notificationModal = document.getElementById('notification-modal');
        const closeNotificationBtn = document.getElementById('close-notification-btn');

        // --- Templates ---
        const templates = {
            home: document.getElementById('home-template').innerHTML,
            about: document.getElementById('about-template').innerHTML,
            help: document.getElementById('help-template').innerHTML,
        };

        // --- Initialization ---
        function initApp() {
            initFirebase();
            initTheme();
            initNavigation();
            initAudio();
            loadPage('home');
            setInterval(checkTasksForNotifications, 15000); // Check every 15 seconds
        }

        function initFirebase() {
            try {
                app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);
                setLogLevel('debug');
                onAuthStateChanged(auth, handleAuthState);
            } catch (error) {
                console.error("Firebase Init Error:", error);
                contentArea.innerHTML = `<p class="text-red-500">Error initializing app.</p>`;
            }
        }

        async function handleAuthState(user) {
            if (user) {
                userId = user.uid;
                userIdDisplay.textContent = userId;
                await setupTaskListener();
            } else {
                try {
                    if (initialAuthToken) await signInWithCustomToken(auth, initialAuthToken);
                    else await signInAnonymously(auth);
                } catch (error) {
                    console.error("Auth Error:", error);
                    userIdDisplay.textContent = "Auth Error";
                }
            }
        }

        // --- Theming ---
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.className = savedTheme;
            themeToggle.checked = savedTheme === 'dark';
            themeToggle.addEventListener('change', () => {
                const newTheme = themeToggle.checked ? 'dark' : 'light';
                document.documentElement.className = newTheme;
                localStorage.setItem('theme', newTheme);
            });
        }
        
        // --- Navigation ---
        function initNavigation() {
            navLinks.forEach(link => link.addEventListener('click', (e) => {
                e.preventDefault();
                const targetId = e.currentTarget.dataset.target;
                loadPage(targetId);
                navLinks.forEach(l => l.classList.remove('active'));
                e.currentTarget.classList.add('active');
                if (sidebar.classList.contains('open')) toggleMobileMenu();
            }));
            menuToggle.addEventListener('click', toggleMobileMenu);
            sidebarOverlay.addEventListener('click', toggleMobileMenu);
        }

        function toggleMobileMenu() {
            sidebar.classList.toggle('open');
            sidebarOverlay.classList.toggle('hidden');
        }

        function loadPage(pageId) {
            contentArea.innerHTML = templates[pageId];
            if (pageId === 'home') {
                initHomePage();
            }
        }

        // --- Page Initializers ---
        function initHomePage() {
            // Re-bind events for the new DOM content
            const taskForm = document.getElementById('task-form');
            taskForm.innerHTML = `
                <div><label for="task-input" class="block text-sm font-medium text-secondary">Task</label><input type="text" id="task-input" placeholder="e.g., Finish project report" class="mt-1 block w-full px-4 py-2 bg-secondary border border-gray-300/20 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" required></div>
                <div><label for="task-date" class="block text-sm font-medium text-secondary">Due Date</label><input type="date" id="task-date" class="mt-1 block w-full px-4 py-2 bg-secondary border border-gray-300/20 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" required></div>
                <div><label for="task-time" class="block text-sm font-medium text-secondary">Due Time</label><input type="time" id="task-time" class="mt-1 block w-full px-4 py-2 bg-secondary border border-gray-300/20 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" required></div>
                <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-indigo-700 transition-transform transform hover:scale-105 shadow-lg"><i class="fas fa-plus-circle mr-2"></i>Add Task</button>
            `;
            taskForm.addEventListener('submit', addTask);
            setMinimumDateTime();
            displayRandomQuote();
            renderTasks(allTasks);
        }

        // --- Firestore ---
        async function setupTaskListener() {
            if (!userId) return;
            if (unsubscribeTasks) unsubscribeTasks();
            const tasksCollectionRef = collection(db, `artifacts/${appId}/users/${userId}/todos`);
            unsubscribeTasks = onSnapshot(query(tasksCollectionRef), (snapshot) => {
                allTasks = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                if(document.getElementById('page-home')) renderTasks(allTasks);
            });
        }

        // --- Task Logic ---
        function renderTasks(tasks) {
            const taskList = document.getElementById('task-list');
            const completedTaskList = document.getElementById('completed-task-list');
            if (!taskList || !completedTaskList) return;
            
            taskList.innerHTML = '';
            completedTaskList.innerHTML = '';
            
            tasks.sort((a, b) => new Date(`${a.date}T${a.time}`) - new Date(`${b.date}T${b.time}`));
            
            let upcomingCount = 0, completedCount = 0;
            tasks.forEach(task => {
                const taskElement = createTaskElement(task);
                if (task.completed) {
                    completedTaskList.appendChild(taskElement);
                    completedCount++;
                } else {
                    taskList.appendChild(taskElement);
                    upcomingCount++;
                }
            });
            
            if (upcomingCount === 0) taskList.innerHTML = `<p class="text-secondary">No upcoming tasks. Great job!</p>`;
            if (completedCount === 0) completedTaskList.innerHTML = `<p class="text-secondary">No tasks completed yet.</p>`;
        }

        function createTaskElement(task) {
            const div = document.createElement('div');
            div.className = `task-item p-4 rounded-xl flex items-center justify-between ${task.completed ? 'completed-task' : ''}`;
            div.dataset.id = task.id;
            const dueDate = new Date(`${task.date}T${task.time}`);
            div.innerHTML = `
                <div class="flex items-center gap-4">
                    <div class="checkbox-custom w-6 h-6 rounded-md border-2 border-gray-300/40 cursor-pointer flex items-center justify-center transition-all ${task.completed ? 'checked' : ''}">
                        <i class="fas fa-check text-white text-xs" style="display: ${task.completed ? 'block' : 'none'};"></i>
                    </div>
                    <div class="task-details">
                        <p class="font-medium text-primary">${task.text}</p>
                        <p class="text-sm text-secondary">${dueDate.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' })} at ${dueDate.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit', hour12: true })}</p>
                    </div>
                </div>
                <button class="delete-btn text-gray-400 hover:text-red-500 text-lg"><i class="fas fa-trash-alt"></i></button>`;
            
            div.querySelector('.checkbox-custom').addEventListener('click', () => toggleTaskCompletion(task.id, !task.completed, div));
            div.querySelector('.delete-btn').addEventListener('click', () => deleteTask(task.id, div));
            return div;
        }

        async function addTask(e) {
            e.preventDefault();
            const taskInput = document.getElementById('task-input');
            const taskDate = document.getElementById('task-date');
            const taskTime = document.getElementById('task-time');
            if (!userId || !taskInput.value.trim()) return;
            await addDoc(collection(db, `artifacts/${appId}/users/${userId}/todos`), {
                text: taskInput.value.trim(), date: taskDate.value, time: taskTime.value,
                completed: false, createdAt: serverTimestamp()
            });
            e.target.reset();
            setMinimumDateTime();
        }

        async function toggleTaskCompletion(id, completed, element) {
            if (!userId) return;
            if (completed) {
                element.classList.add('completed-animation');
                setTimeout(() => {
                    updateDoc(doc(db, `artifacts/${appId}/users/${userId}/todos`, id), { completed });
                }, 300);
            } else {
                await updateDoc(doc(db, `artifacts/${appId}/users/${userId}/todos`, id), { completed });
            }
        }

        async function deleteTask(id, element) {
            if (!userId) return;
            element.classList.add('completed-animation');
            setTimeout(() => {
                deleteDoc(doc(db, `artifacts/${appId}/users/${userId}/todos`, id));
            }, 300);
        }

        // --- Notifications & Sound ---
        function initAudio() {
            document.body.addEventListener('click', () => {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }, { once: true });
        }
        
        function playNotificationSound() {
            if (!audioCtx) return;
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); // A6 note
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.5);
            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 0.5);
        }

        function checkTasksForNotifications() {
            const now = new Date().getTime();
            const fifteenMinutes = 15 * 60 * 1000;
            let notifiedTasks = JSON.parse(localStorage.getItem('notifiedTasks') || '{}');

            allTasks.filter(task => !task.completed).forEach(task => {
                const taskDueDate = new Date(`${task.date}T${task.time}`).getTime();
                
                // Upcoming notification
                if (taskDueDate > now && taskDueDate - now < fifteenMinutes && notifiedTasks[task.id] !== 'upcoming') {
                    showNotification('Upcoming Task!', `In 15 minutes: "${task.text}"`, '🔔');
                    notifiedTasks[task.id] = 'upcoming';
                }
                
                // Due notification
                if (taskDueDate <= now && notifiedTasks[task.id] !== 'due') {
                    showNotification("Time's Up!", `It's time for your task: "${task.text}"`, '⏰');
                    notifiedTasks[task.id] = 'due';
                }
            });
            localStorage.setItem('notifiedTasks', JSON.stringify(notifiedTasks));
        }
        
        function showNotification(title, message, icon) {
            const modalContent = notificationModal.querySelector('.modal-content');
            notificationModal.querySelector('h3').textContent = title;
            notificationModal.querySelector('p').textContent = message;
            notificationModal.querySelector('.text-5xl').textContent = icon;
            notificationModal.classList.remove('opacity-0', 'pointer-events-none');
            modalContent.classList.remove('scale-95');
            playNotificationSound();
        }

        closeNotificationBtn.addEventListener('click', () => {
            notificationModal.classList.add('opacity-0', 'pointer-events-none');
            notificationModal.querySelector('.modal-content').classList.add('scale-95');
        });

        // --- Utilities ---
        const quotes = [
            { text: "The secret of getting ahead is getting started.", author: "Mark Twain" },
            { text: "The future depends on what you do today.", author: "Mahatma Gandhi" },
            { text: "Well done is better than well said.", author: "Benjamin Franklin" }
        ];

        function displayRandomQuote() {
            const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
            document.getElementById('quote-text').textContent = `"${randomQuote.text}"`;
            document.getElementById('quote-author').textContent = `- ${randomQuote.author}`;
        }

        function setMinimumDateTime() {
            const taskDate = document.getElementById('task-date');
            if(!taskDate) return;
            const now = new Date();
            const year = now.getFullYear();
            const month = (now.getMonth() + 1).toString().padStart(2, '0');
            const day = now.getDate().toString().padStart(2, '0');
            taskDate.min = `${year}-${month}-${day}`;
        }

        // --- Start the App ---
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
